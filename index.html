<!doctype html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuerdo RyK</title>
</head>

<body>
  <div id="root"></div>
  <script>
    // Complemento del 404.html: si venimos de un redirect, restaura la ruta real
    (function () {
      var redirect = window.location.search.slice(1).split('&').find(function (s) {
        return s.indexOf('/') === 0
      });
      if (redirect) {
        var path = redirect.replace(/~and~/g, '&');
        window.history.replaceState(null, null, window.location.pathname.replace(/\/$/, '') + path);
      }
    })();
  </script>

  <script type="module" src="/src/main.jsx"></script>
  
</body>

</html>
