<body>
  <div id="root"></div>
  <script>
    // Complemento del 404.html: si venimos de un redirect, restaura la ruta real
    (function () {
      var redirect = window.location.search.slice(1).split('&').find(function (s) {
        return s.indexOf('/') === 0
      });
      if (redirect) {
        var path = redirect.replace(/~and~/g, '&');
        window.history.replaceState(null, null, window.location.pathname.replace(/\/$/, '') + path);
      }
    })();
  </script>

  
</body>
